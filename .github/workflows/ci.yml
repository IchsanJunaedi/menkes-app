name: CI

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Required for turbo repo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npx turbo run lint

      - name: Check Formatting
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,md}"

      - name: Type Check
        run: npx turbo run type-check

      - name: Run Tests
        run: npx turbo run test

      - name: Build Projects
        run: npx turbo run build
